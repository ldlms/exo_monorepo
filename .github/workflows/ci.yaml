name: Deploy

on:
  push:
    branches: [main]
    tags:
      - 'v*'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./monorepo_front
          file: ./monorepo_front/Dockerfile
          push: true
          tags: ldlms/monorepo_front:latest

      - name: Build & Push backend
        uses: docker/build-push-action@v5
        with:
          context: ./monorepo_back
          file: ./monorepo_back/Dockerfile
          push: true
          tags: ldlms/monorepo_back:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy compose file to manager
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.MANAGER_HOST }}
          username: github-actions
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: docker-compose.yml
          target: /opt/monolite

      - name: Deploy to Swarm
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.MANAGER_HOST }}
          username: github-actions
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/monolite
            docker login -u ${{ secrets.DOCKERHUB_USER }} -p ${{ secrets.DOCKERHUB_TOKEN }}
            docker stack deploy \
              --compose-file docker-compose.yml \
              --with-registry-auth \
              monolite