services:
  frontend:
    image: ldlms/monorepo_front:${TAG:-latest}
    ports:
      - "80:80"
    networks:
      - monolite
    deploy:
      replicas: 4
      restart_policy:
        condition: on-failure
      update_config:
        parallelism: 2
        delay: 10s

  backend:
    image: ldlms/monorepo_back:${TAG:-latest}
    ports:
      - "8080:8080"
    networks:
      - monolite
    deploy:
      replicas: 4
      restart_policy:
        condition: on-failure
      update_config:
        parallelism: 2
        delay: 10s

networks:
  monolite:
    driver: overlay  